group   = drc
type    = WRITE
button  = Apply
cmd     = /home/giacomo/DRC/brutefir-conf/drc.sh 192000
process = brutefir

[drc_96000]
what    = DRC 96 kHz
group   = drc
type    = WRITE
button  = Apply
cmd     = /home/giacomo/DRC/brutefir-conf/drc.sh 96000
