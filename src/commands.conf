# arkictrl commands configuration
#
# Each [section] defines one command.  Section name = command id (no spaces).
#
# Required keys (all commands):
#   what   – label shown next to the widget
#   group  – card section name (drc | apps | system | any custom name)
#   type   – READ or WRITE
#   cmd    – shell command to execute
#
# WRITE-only keys:
#   button  – button label text (e.g. Apply, Launch, Reboot)
#   confirm – yes | no  (show confirmation dialog before running; default no)
#
# READ-only keys:
#   refresh – auto-refresh interval in seconds (omit or 0 = manual only)
#
# Optional keys (READ or WRITE):
#   unit    – systemctl unit name; when 'systemctl is-active <unit>' succeeds
#             a Details button appears next to the widget
#   details – absolute path to a Markdown (.md) file rendered on the details
#             page; images may use paths relative to the .md file's directory
#
# Example READ command (uncomment and adapt):
# [cpu_temp]
# what    = CPU temperature
# group   = system
# type    = READ
# refresh = 10
# cmd     = sensors | awk '/Core 0/{print $3}'

[drc_off]
what   = No DRC
group  = drc
type   = WRITE
button = Apply
cmd    = /home/giacomo/DRC/brutefir-conf/drc.sh off
unit   = brutefir.service
details = /home/giacomo/DRC/brutefir-conf/docs/off.md

[drc_flat]
what   = DRC Flat (0 dB)
group  = drc
type   = WRITE
button = Apply
cmd    = /home/giacomo/DRC/brutefir-conf/drc.sh 120.blue+0dB
unit   = brutefir.service
details = /home/giacomo/DRC/brutefir-conf/docs/120.blue+0dB.md

[drc_2db]
what   = DRC +2 dB
group  = drc
type   = WRITE
button = Apply
cmd    = /home/giacomo/DRC/brutefir-conf/drc.sh 120.blue+2dB
unit   = brutefir.service
details = /home/giacomo/DRC/brutefir-conf/docs/120.blue+2dB.md

[drc_sox]
what   = DRC +2 dB (sox / float64)
group  = drc
type   = WRITE
button = Apply
cmd    = /home/giacomo/DRC/brutefir-conf/drc.sh 120.blue+2dB-sox-float64
unit   = brutefir.service
details = /home/giacomo/DRC/brutefir-conf/docs/120.blue+2dB-sox-float64.md

[chrome]
what   = Google Chrome
group  = apps
type   = WRITE
button = Launch
cmd    = google-chrome

[kodi]
what   = Kodi media center
group  = apps
type   = WRITE
button = Launch
cmd    = kodi

[reboot]
what    = Reboot system
group   = system
type    = WRITE
button  = Reboot
confirm = yes
cmd     = sudo reboot

[poweroff]
what    = Power off
group   = system
type    = WRITE
button  = Off
confirm = yes
cmd     = sudo poweroff
