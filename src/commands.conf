[drc_88200]
what    = DRC 88.2 kHz
group   = drc
type    = WRITE
button  = Apply
cmd     = /home/giacomo/DRC/brutefir-conf/drc.sh 88200
process = brutefir

[drc_48000]
what    = DRC 48 kHz
group   = drc
type    = WRITE
button  = Apply
