[chrome]
what   = Google Chrome
group  = apps
type   = WRITE
button = Launch
cmd    = google-chrome

[kodi]
what   = Kodi media center
group  = apps
type   = WRITE
button = Launch
cmd    = kodi

[reboot]
what    = Reboot system
group   = system
type    = WRITE
button  = Reboot
confirm = yes
cmd     = sudo reboot

[poweroff]
what    = Power off
group   = system
type    = WRITE
button  = Off
confirm = yes
cmd     = sudo poweroff
