# omdrcctrl commands configuration
#
# Each [section] defines one command.  Section name = command id (no spaces).
#
# Required keys (all commands):
#   what   – label shown next to the widget
#   group  – card section name (drc | apps | system | any custom name)
#   type   – READ | WRITE | LINK
#   cmd    – shell command to execute (READ and WRITE only)
#
# WRITE-only keys:
#   button  – button label text (e.g. Apply, Launch, Reboot)
#   confirm – yes | no  (show confirmation dialog before running; default no)
#
# READ-only keys:
#   refresh      – auto-refresh interval in seconds (omit or 0 = manual only)
#   details_root – root dir for dynamic details lookup ({root}/{output}/README.md)
#
# LINK-only keys:
#   url – URL to open in a new tab (e.g. http://192.168.1.1/)
#
# Optional keys (READ or WRITE):
#   process – process name checked with pgrep -x; Details button appears when
#             the process is running. Use this instead of 'unit' when the
#             process is not managed by systemd or to avoid any systemd side
#             effects.
#   unit    – systemctl unit name; when 'systemctl is-active <unit>' succeeds
#             a Details button appears. Prefer 'process' when possible.
#   details – absolute path to a Markdown (.md) file rendered on the details
#             page; images may use paths relative to the .md file's directory
#   (one of 'process' or 'unit' must be present together with 'details')
#   details_link – external URL for a static always-visible Details button (overrides
#                 the conditional process/unit-based Details button)
#
# Example READ command (uncomment and adapt):
# [cpu_temp]
# what    = CPU temperature
# group   = system
# type    = READ
# refresh = 10
# cmd     = sensors | awk '/Core 0/{print $3}'

# ── Monitor settings ───────────────────────────────────────────────────────
# Settings for the MPD and top-CPU monitoring panels.
[monitor]
# Processes with %CPU below this threshold are omitted from the top-CPU list.
topcpu_threshold = 4.0
# Refresh interval in seconds for the MPD panel.
monitor_interval = 5
# Refresh interval in seconds for the top-CPU panel. This runs ps.
topcpu_interval = 5
# Refresh interval in seconds for the audio devices panel.
sndstat_interval = 5
# Refresh interval in seconds for the BruteFIR CPU panel.
brutefir_interval = 5

# ── Qobuz Connect integration ──────────────────────────────────────────────
# Paths to the files written by qobuzconnect2mpd.  Change these if you use
# non-default paths (qconnectstatusfile / qconnectlogfile in its config).
[qconnect]
status_file = /tmp/qconnect2mpd-status.txt
log_file    = /tmp/qconnect2mpd.log

[drc_status]
what    = Active config
group   = drc
type    = READ
refresh = 5
cmd     = /home/giacomo/DRC/brutefir-conf/drc-status.sh

[drc_off]
what    = No DRC
group   = drc
type    = WRITE
button  = Apply
cmd     = /home/giacomo/DRC/brutefir-conf/drc.sh off
process = brutefir

[drc_resamp]
what    = DRC Flat (0 dB) — auto resample
group   = drc
type    = WRITE
button  = Apply
cmd     = /home/giacomo/DRC/brutefir-conf/drc.sh resamp
process = brutefir
details_link = https://github.com/delleceste/DRC-120.blue/tree/master/README.md

[drc_192000]
